{% extends 'base.html' %}

{% block content %}
<style>
    .loading-frame {
        text-align: center;
        margin: 40px auto;
        padding: 25px;
        border: 2px dashed #000000;
        background: #d8d8d8;
    }
    .retro-spinner {
        margin: 20px auto;
        width: 32px;
        height: 32px;
        border: 4px solid #7f7f7f;
        border-top: 4px solid #000000;
        border-radius: 50%;
        animation: spin 1.2s linear infinite;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>

<!-- hook for static asset targeting via dataset payload -->
<div id="loading-container" class="loading-frame" data-uuid="{{ search_uuid }}">
    <h2>[ EVALUATING VEHICLE DATA ]</h2>
    <div class="retro-spinner"></div>
    <p>Parsing raw database metrics, seller texts, and CARFAX records.</p>
    <p>Establishing secure upstream connection to AI agent payload...</p>
    <p><strong>PLEASE DO NOT REFRESH OR CLOSE THIS TAB</strong></p>
</div>

<script src="{{ url_for('static', filename='js/loading.js') }}"></script>
{% endblock %}
