{% extends "base.html" %}

{% block content %}
<h3>Search Vehicle Database</h3>

<p>Select the vehicle details below to run a diagnostic check.</p>

<form action="/analyze" method="POST">
    <table border="1" cellpadding="5" cellspacing="0" width="80%" align="center" style="background-color: #ffffff;">
        <tr>
            <td width="30%"><b>Year:</b></td>
            <td>
                <select name="year" id="vehicle_year" required style="width: 95%;">
                    <option value="" disabled selected>-- Select Year --</option>
                    <option value="1996">1996</option>
                    <option value="1997">1997</option>
                    <option value="1998">1998</option>
                    <option value="1999">1999</option>
                    <option value="2000">2000</option>
                    <option value="2001">2001</option>
                    <option value="2002">2002</option>
                    <option value="2003">2003</option>
                    <option value="2004">2004</option>
                    <option value="2005">2005</option>
                    <option value="2006">2006</option>
                    <option value="2007">2007</option>
                    <option value="2008">2008</option>
                    <option value="2009">2009</option>
                    <option value="2010">2010</option>
                    <option value="2011">2011</option>
                    <option value="2012">2012</option>
                    <option value="2013">2013</option>
                    <option value="2014">2014</option>
                    <option value="2015">2015</option>
                    <option value="2016">2016</option>
                    <option value="2017">2017</option>
                    <option value="2018">2018</option>
                    <option value="2019">2019</option>
                    <option value="2020">2020</option>
                    <option value="2021">2021</option>
                    <option value="2022">2022</option>
                    <option value="2023">2023</option>
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                </select>
            </td>
        </tr>
        <tr>
            <td><b>Make:</b></td>
            <td>
                <select name="make" id="vehicle_make" required style="width: 95%;" disabled>
                    <option value="" disabled selected>-- Select Make --</option>
                </select>
            </td>
        </tr>
        <tr>
            <td><b>Model:</b></td>
            <td>
                <select name="model" id="vehicle_model" required style="width: 95%;" disabled>
                    <option value="" disabled selected>-- Select Model --</option>
                </select>
            </td>
        </tr>
        <tr>
            <td valign="top"><b>Listing Text:</b><br><small>(Paste seller ad here)</small></td>
            <td>
                <textarea name="listing_text" rows="8" style="width: 95%; overflow: hidden;"></textarea>
            </td>
        </tr>
        <!-- hidden CARFAX row -->
        <tr id="carfax_row" style="display: none;">
            <td valign="top"><b>CARFAX Text:</b><br><small>(Paste report here)</small></td>
            <td>
                <textarea name="carfax_text" rows="8" style="width: 95%; overflow: hidden;"></textarea>
            </td>
        </tr>
    </table>
    
    <br>
    <center>
        <input type="button" id="carfax_btn" value="[+] Add CARFAX report">
        <br><br>
        <input type="submit" value=">> SEARCH <<">
        <input type="reset" value="Clear" id="reset_btn">
    </center>
</form>

<script src="{{ url_for('static', filename='js/search.js') }}"></script>
{% endblock %}
